name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [crowpanel-p4-50, crowpanel-p4-70-90-101]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build app firmware
        run: ./bin/build.sh ${{ matrix.target }}

      - name: Download C6 firmware payload
        run: ./bin/download_c6_fw.sh

      - name: Build LittleFS image
        run: ./bin/buildfs.sh ${{ matrix.target }}

      - name: Package artifacts and install script
        run: |
          set -euo pipefail

          OUT_DIR="out/${{ matrix.target }}"
          mkdir -p "$OUT_DIR"

          cp .pio/build/${{ matrix.target }}/firmware.bin "$OUT_DIR/"
          cp .pio/build/${{ matrix.target }}/bootloader.bin "$OUT_DIR/"
          cp .pio/build/${{ matrix.target }}/partitions.bin "$OUT_DIR/"
          cp .pio/build/${{ matrix.target }}/littlefs.bin "$OUT_DIR/"
          cp data/network_adapter_esp32c6.bin "$OUT_DIR/"

          cat > "$OUT_DIR/install.sh" <<'EOF'
          #!/usr/bin/env bash
          # Flash all release artifacts for CrowPanel ESP32-P4.

          set -euo pipefail

          usage() {
            echo "Usage: $0 <serial_port> [baud_rate]"
            echo "Example: $0 /dev/ttyACM0 921600"
          }

          if [[ $# -lt 1 ]]; then
            usage
            exit 1
          fi

          PORT="$1"
          BAUD="${2:-921600}"

          if command -v esptool.py >/dev/null 2>&1; then
            ESPTOOL=(esptool.py)
          elif command -v esptool >/dev/null 2>&1; then
            ESPTOOL=(esptool)
          else
            ESPTOOL=(python3 -m esptool)
          fi

          REQUIRED=(
            bootloader.bin
            partitions.bin
            firmware.bin
            littlefs.bin
            network_adapter_esp32c6.bin
          )

          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "ERROR: missing artifact '$f' in $(pwd)"
              exit 1
            fi
          done

          "${ESPTOOL[@]}" \
            --chip esp32p4 \
            --port "$PORT" \
            --baud "$BAUD" \
            --before default_reset \
            --after hard_reset \
            write_flash \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 16MB \
            0x0000 bootloader.bin \
            0x8000 partitions.bin \
            0x10000 firmware.bin \
            0x410000 littlefs.bin \
            0x5F0000 network_adapter_esp32c6.bin

          echo "Flash completed successfully."
          EOF

          chmod +x "$OUT_DIR/install.sh"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: out/${{ matrix.target }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release notes
        run: |
          set -euo pipefail

          RELEASE_TAG="${GITHUB_REF_NAME}"
          C6_RELEASE_TAG="$(curl -fsSL https://api.github.com/repos/esphome/esp-hosted-firmware/releases/latest \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['tag_name'])")"

          export RELEASE_TAG
          export C6_RELEASE_TAG

          python3 - <<'PY'
          import os
          from pathlib import Path

          template = Path('.github/release-notes-template.md').read_text(encoding='utf-8')
          content = template.replace('{{RELEASE_TAG}}', os.environ['RELEASE_TAG'])
          content = content.replace('{{C6_RELEASE_TAG}}', os.environ['C6_RELEASE_TAG'])
          Path('release-notes.md').write_text(content, encoding='utf-8')
          PY

          echo "Using ESP32-C6 firmware release: $C6_RELEASE_TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-assets/**/*
