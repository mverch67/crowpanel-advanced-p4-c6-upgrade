name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [crowpanel-p4-50, crowpanel-p4-70-90-101]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build app firmware
        run: ./bin/build.sh ${{ matrix.target }}

      - name: Download C6 firmware payload
        run: ./bin/download_c6_fw.sh

      - name: Build LittleFS image
        run: ./bin/buildfs.sh ${{ matrix.target }}

      - name: Package zip bundle
        run: |
          set -euo pipefail

          RELEASE_TAG="${GITHUB_REF_NAME}"
          C6_RELEASE_TAG="$(curl -fsSL https://api.github.com/repos/esphome/esp-hosted-firmware/releases/latest \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['tag_name'])")"

          BUILD_DIR=".pio/build/${{ matrix.target }}"
          APP_BIN_NAME="${GITHUB_REPOSITORY##*/}.bin"
          APP_BIN_PATH="$BUILD_DIR/$APP_BIN_NAME"
          if [[ ! -f "$APP_BIN_PATH" ]]; then
            echo "ERROR: missing app binary $APP_BIN_PATH"
            exit 1
          fi

          FLASH_MODE="dio"
          FLASH_FREQ="80m"
          FLASH_SIZE="16MB"
          BOOT_OFFSET="0x2000"
          PART_OFFSET="0x8000"
          OTADATA_OFFSET="0xD000"
          APP_OFFSET="0x10000"
          STORAGE_OFFSET="0x410000"

          OUT_DIR="out/${{ matrix.target }}"
          mkdir -p "$OUT_DIR"

          cp "$APP_BIN_PATH" "$OUT_DIR/firmware.bin"
          cp "$BUILD_DIR/bootloader/bootloader.bin" "$OUT_DIR/bootloader.bin"
          cp "$BUILD_DIR/partition_table/partition-table.bin" "$OUT_DIR/partitions.bin"
          # Keep release artifacts toolchain-agnostic: generate the standard blank OTADATA image.
          python3 - <<'PY'
          from pathlib import Path
          Path('out/${{ matrix.target }}/ota_data_initial.bin').write_bytes(b'\xff' * 0x2000)
          PY
          cp "$BUILD_DIR/littlefs.bin" "$OUT_DIR/littlefs.bin"

          cat > "$OUT_DIR/install.sh" <<'EOF'
          #!/usr/bin/env bash
          # Flash all release artifacts for CrowPanel ESP32-P4.

          set -euo pipefail

          usage() {
            echo "Usage: $0 <serial_port> [baud_rate]"
            echo "Example: $0 /dev/ttyUSB0 921600"
          }

          if [[ $# -lt 1 ]]; then
            usage
            exit 1
          fi

          PORT="$1"
          BAUD="${2:-921600}"

          FLASH_MODE="__FLASH_MODE__"
          FLASH_FREQ="__FLASH_FREQ__"
          FLASH_SIZE="__FLASH_SIZE__"
          BOOT_OFFSET="__BOOT_OFFSET__"
          PART_OFFSET="__PART_OFFSET__"
          OTADATA_OFFSET="__OTADATA_OFFSET__"
          APP_OFFSET="__APP_OFFSET__"
          STORAGE_OFFSET="__STORAGE_OFFSET__"

          if command -v esptool >/dev/null 2>&1; then
            ESPTOOL=(esptool)
          elif command -v esptool.py >/dev/null 2>&1; then
            ESPTOOL=(esptool.py)
          else
            ESPTOOL=(python3 -m esptool)
          fi

          REQUIRED=(
            bootloader.bin
            partitions.bin
            ota_data_initial.bin
            firmware.bin
            littlefs.bin
          )

          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "ERROR: missing artifact '$f' in $(pwd)"
              exit 1
            fi
          done

          "${ESPTOOL[@]}" \
            --chip esp32p4 \
            --port "$PORT" \
            --baud "$BAUD" \
            --before default-reset \
            --after hard-reset \
            write-flash \
            --flash-mode "$FLASH_MODE" \
            --flash-freq "$FLASH_FREQ" \
            --flash-size "$FLASH_SIZE" \
            "$BOOT_OFFSET" bootloader.bin \
            "$PART_OFFSET" partitions.bin \
            "$OTADATA_OFFSET" ota_data_initial.bin \
            "$APP_OFFSET" firmware.bin \
            "$STORAGE_OFFSET" littlefs.bin

          echo "Flash completed successfully."
          EOF

          sed -i "s|__FLASH_MODE__|$FLASH_MODE|g" "$OUT_DIR/install.sh"
          sed -i "s|__FLASH_FREQ__|$FLASH_FREQ|g" "$OUT_DIR/install.sh"
          sed -i "s|__FLASH_SIZE__|$FLASH_SIZE|g" "$OUT_DIR/install.sh"
          sed -i "s|__BOOT_OFFSET__|$BOOT_OFFSET|g" "$OUT_DIR/install.sh"
          sed -i "s|__PART_OFFSET__|$PART_OFFSET|g" "$OUT_DIR/install.sh"
          sed -i "s|__OTADATA_OFFSET__|$OTADATA_OFFSET|g" "$OUT_DIR/install.sh"
          sed -i "s|__APP_OFFSET__|$APP_OFFSET|g" "$OUT_DIR/install.sh"
          sed -i "s|__STORAGE_OFFSET__|$STORAGE_OFFSET|g" "$OUT_DIR/install.sh"

          chmod +x "$OUT_DIR/install.sh"

          SAFE_RELEASE_TAG="$(printf '%s' "$RELEASE_TAG" | tr '/ ' '__')"
          SAFE_C6_RELEASE_TAG="$(printf '%s' "$C6_RELEASE_TAG" | tr '/ ' '__')"
          ZIP_NAME="${{ matrix.target }}_${SAFE_RELEASE_TAG}_c6-${SAFE_C6_RELEASE_TAG}.zip"

          (
            cd "$OUT_DIR"
            zip -q -r "../$ZIP_NAME" .
          )

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-bundle
          path: out/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release notes
        run: |
          set -euo pipefail

          RELEASE_TAG="${GITHUB_REF_NAME}"
          FIRST_ARCHIVE="$(find release-assets -type f -name '*.zip' | sort | head -n1)"
          if [[ -z "$FIRST_ARCHIVE" ]]; then
            echo "ERROR: no zip archives found in release-assets"
            exit 1
          fi

          ARCHIVE_BASENAME="$(basename "$FIRST_ARCHIVE")"
          C6_RELEASE_TAG="$(printf '%s' "$ARCHIVE_BASENAME" | sed -n 's/.*_c6-\(.*\)\.zip/\1/p')"
          if [[ -z "$C6_RELEASE_TAG" ]]; then
            echo "ERROR: could not extract C6 release tag from archive name: $ARCHIVE_BASENAME"
            exit 1
          fi

          export RELEASE_TAG
          export C6_RELEASE_TAG

          python3 - <<'PY'
          import os
          from pathlib import Path

          template = Path('.github/release-notes-template.md').read_text(encoding='utf-8')
          content = template.replace('{{RELEASE_TAG}}', os.environ['RELEASE_TAG'])
          content = content.replace('{{C6_RELEASE_TAG}}', os.environ['C6_RELEASE_TAG'])
          Path('release-notes.md').write_text(content, encoding='utf-8')
          PY

          echo "Using ESP32-C6 firmware release: $C6_RELEASE_TAG"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-assets/**/*.zip
